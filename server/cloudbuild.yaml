# Cloud Build 구성 — GitHub main 푸시 시 자동으로 Docker 이미지 빌드 + Cloud Run 배포.
# 트리거에서 `--substitutions=_REGION=asia-northeast3,_SERVICE=sortsmake-server` 같이 환경 변수 오버라이드 가능.

substitutions:
  _REGION: asia-northeast3
  _SERVICE: sortsmake-server
  _BUCKET_SUFFIX: -sortsmake
  _IMAGE_REPO: cloud-run-source-deploy
  _IMAGE_NAME: sortsmake-server

steps:
  # 1) Docker 이미지 빌드
  - id: build
    name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/${_IMAGE_NAME}:$COMMIT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/${_IMAGE_NAME}:latest'
      - ./server

  # 2) Artifact Registry에 푸시
  - id: push
    name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/${_IMAGE_NAME}'

  # 3) Cloud Run 배포 (기존 환경 변수/설정 유지하면서 이미지만 교체)
  - id: deploy
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --set-env-vars=BUCKET_NAME=$PROJECT_ID${_BUCKET_SUFFIX}
      - --quiet

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/${_IMAGE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
